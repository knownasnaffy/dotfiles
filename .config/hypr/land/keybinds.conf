###################
### KEYBINDINGS ###
###################

$mainMod = SUPER


############
### APPS ###
############

bind = $mainMod, return, exec, ~/.config/hypr/scripts/open-terminal.sh

bind = $mainMod, A, submap, apps

submap = apps, reset

    bind = , B, exec, $appLauncher beeper
    bind = , S, exec, ~/.config/hypr/scripts/app-specific-workspace.sh spotify-launcher spotify spotify
    bind = , A, exec, $appLauncher $menu # App Launcher, Semi File Explorer, Window Switcher, etc
    bind = , M, exec, $appLauncher $terminal --title Aerc -e aerc # Email Client

    bind = , escape, submap, reset
    bind = , q, submap, reset

submap = reset


###############
### WINDOWS ###
###############

bind = $mainMod, Q, killactive

bind = $mainMod, TAB, focuswindow, floating
bind = $mainMod SHIFT, TAB, focuswindow, tiled


bind = $mainMod, W, submap, window

submap = window

    bind = , F, fullscreen, toggle 
    bind = , F, submap, reset

    bind = SHIFT, F, togglefloating,
    bind = SHIFT, F, submap, reset

    bind = , U, focusurgentorlast
    bind = , U, submap, reset

    bind = , P, pin
    bind = , P, submap, reset

    bind = , C, exec, hyprctl dispatch centerwindow

    bind = , escape, submap, reset
    bind = , q, submap, reset

submap = reset


submap = resize

    binde = , right, resizeactive, 10 0
    binde = , left, resizeactive, -10 0
    binde = , up, resizeactive, 0 -10
    binde = , down, resizeactive, 0 10

    bind = , J, resizeactive, 10 0
    bind = , semicolon, resizeactive, -10 0
    bind = , L, resizeactive, 0 -10
    bind = , K, resizeactive, 0 10

    bind = SHIFT, J, resizeactive, 50 0
    bind = SHIFT, semicolon, resizeactive, -50 0
    bind = SHIFT, L, resizeactive, 0 -50
    bind = SHIFT, K, resizeactive, 0 50

    bind = , escape, submap, reset
    bind = , q, submap, reset

submap = reset


# Reload hyprland and waybar
bind = $mainMod, G, exec, hyprctl reload; killall -SIGUSR2 waybar


# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, workspace, e-1
bind = $mainMod, down, workspace, e+1

# Move focus with mainMod + jkl;
bind = $mainMod, J, layoutmsg, focus l
bind = $mainMod, semicolon, layoutmsg, focus r
bind = $mainMod, K, workspace, e+1
bind = $mainMod, L, workspace, e-1

bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod SHIFT, mouse_up, layoutmsg, focus r
bind = $mainMod SHIFT, mouse_down, layoutmsg, focus l

# Move window with mainMod + shift + jkl;
bind = $mainMod SHIFT, J, layoutmsg, swapcol l
bind = $mainMod SHIFT, semicolon, layoutmsg, swapcol r
bind = $mainMod SHIFT, L, movewindow, l
bind = $mainMod SHIFT, K, movewindow, r


# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


###############
### FOLDERS ###
###############

bind = $mainMod, F, submap, folders

submap = folders, reset

    bind = , D, exec, $fileManager ~/Downloads
    bind = , B, exec, $fileManager ~/Downloads/Beeper
    bind = , S, exec, $fileManager ~/Pictures/Screenshots
    bind = , R, exec, $fileManager "~/Videos/Screen Recordings"

    bind = , escape, submap, reset
    bind = , q, submap, reset

submap = reset


#################
### UTILITIES ###
#################

bind = $mainMod, O, submap, utilities

submap = utilities, reset

    bind = , I, exec, $appLauncher $terminal --title=Impala -e impala # Wifi Management
    bind = , B, exec, $appLauncher $terminal --title=Bluetuith -e bluetuith # Bluetooth Management
    bind = SHIFT, B, exec, ~/.config/rofi/applets/bin/bookmarks.sh # Bookmark Manager
    bind = , O, exec, qs ipc call powermenu toggle
    bind = , U, exec, qs ipc call clipboard toggle
    bind = , P, exec, ~/.config/rofi/applets/bin/pass.sh # Password and OTP
    bind = , W, exec, quickshell ipc call wallpaper-changer toggle
    bind = , S, exec, ~/.config/rofi/applets/bin/snippets.sh # Snippets
    bind = , R, exec, ~/.config/rofi/applets/bin/recordscreen.sh # Record Screen
    bind = , C, exec, hyprpicker --autocopy # Color Picker (hex)
    bind = SHIFT, C, exec, ~/.config/rofi/applets/bin/colorpicker.sh # Color Picker (select format)

    bind = , escape, submap, reset
    bind = , q, submap, reset

submap = reset


bind = $mainMod, N, exec, swaync-client -t -sw # Toggle Notification Panel
bind = $mainMod SHIFT, N, exec, pkill swaync && notify-send NotifiTest "You are a @$&%" && swaync-client -t -sw
bind = $mainMod SHIFT, M, exec, pkill swaync && notify-send NotifiTest "You are a @$&%"
bind = $mainMod, M, exec, notify-send NotifiTest "You are a @$&%"


#############
### MENUS ###
#############

bindr = $mainMod, Space, exec, ~/.config/rofi/applets/bin/global.sh # App Launcher, Semi File Explorer, Window Switcher, etc

bind = $mainMod, P, exec, ~/.config/rofi/applets/bin/clipboard.sh # Clipboard
bind = $mainMod, S, exec, ~/.config/rofi/applets/bin/screenshot.sh ss
bind = $mainMod SHIFT, S, exec, ~/.config/rofi/applets/bin/screenshot.sh
bind = , Print, exec, ~/.config/rofi/applets/bin/screenshot.sh ss # Screenshot
bind = $mainMod, E, exec, ~/.config/rofi/applets/bin/emojipicker.sh # Emoji Picker

bind = $mainMod, R, exec, ~/.config/rofi/applets/bin/recordscreen.sh stop # Stop Recording


##################
### WORKSPACES ###
##################

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, grave, exec, ~/.config/hypr/scripts/scratchpad-term.sh
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic



############
### MISC ###
############

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, qs ipc call brightness increase
bindel = ,XF86MonBrightnessDown, exec, qs ipc call brightness decrease

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# Asus kbd backlight
bindl = , XF86Launch4, exec, asusctl aura -n


bindl = , XF86Calculator, exec, rofi -modi calc -show calc -theme ~/.config/rofi/launchers/type-1/dmenu.rasi # Calculator using Rofi


bind = , XF86TouchpadToggle, exec, ~/.config/hypr/scripts/touchpad-toggle.sh


bind = , XF86PowerOff, exec, hyprlock

# Monitor profile switch: original scale (integer, X11-safe)
bind = $mainMod, F9, exec, hyprctl keyword monitor "eDP-1,1920x1080@144,0x0,1"

# For color pickers and stuff that require an opaque background
bind = $mainMod, F6, exec, hyprctl keyword decoration:active_opacity 1; hyprctl keyword decoration:inactive_opacity 1
